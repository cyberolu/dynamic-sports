<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dynamic Sports Home</title>

  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="assets/Untitled-design-1.svg">
  <link rel="icon" type="image/svg+xml" href="assets/Untitled-design-1.svg">
</head>

<body class="home-page">

  <!-- HEADER -->
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="./">
        <img src="assets/Untitled-design-1.svg" alt="Dynamic Sports logo">
        Dynamic Sports
      </a>
      <nav class="nav"></nav>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- WELCOME -->
    <section class="hero-welcome container">
      <h1>Welcome to Dynamic Sports</h1>
      <p class="muted small">
        Your hub for athletic news, results, and upcoming competitions.
      </p>
    </section>

    <!-- COMPETITIONS -->
    <section class="home-section container">
      <h2>Upcoming Competitions</h2>
      <ul id="homeComps" class="comp-list"></ul>
    </section>

    <!-- NEWS -->
    <section class="home-section container">
      <h2>Latest News</h2>

      <div id="latestNews" class="news-list"></div>

      <!-- ✅ ADD THIS BUTTON -->
      <div style="text-align:center; margin-top:20px;">
        <a href="news/" class="btn">View All News</a>
      </div>

    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="wrap footer-wrap footer-inline">

      <div class="footer-left">
        <p>© <span id="year"></span> Dynamic Sports</p>
      </div>

      <div class="footer-center footer-social">
        <a href="https://www.facebook.com/share/1DAqHW1CVQ/" target="_blank" aria-label="Facebook">
          <img src="assets/facebook.png" alt="Facebook">
        </a>
        <a href="https://www.instagram.com/dynamic_athletics_hub?igsh=MWJja25ubXF1bDIzaQ==" target="_blank" aria-label="Instagram">
          <img src="assets/instagram.png" alt="Instagram">
        </a>
      </div>

      <div class="footer-right footer-credit">
        <span>Site by Olusoji Fasuba</span>
        <a href="https://www.codebuiltsites.com" target="_blank" rel="noopener">
          <img src="assets/logo.png" alt="Codebuilt Sites" class="footer-logo">
        </a>
      </div>

    </div>
  </footer>

  <!-- SCRIPTS -->
  <script type="module" src="scripts/nav.js"></script>
  <script type="module" src="scripts/home.js"></script>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</body>
</html>

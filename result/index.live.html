<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Competition Results – Dynamic Sports</title>

  <link rel="stylesheet" href="../style.css" />
  <script type="module" src="../scripts/nav.js"></script>

  <link rel="icon" href="../assets/Untitled-design-1.svg">
</head>

<body class="page">

<header class="site-header">
  <div class="wrap">
    <a class="brand" href="../index.html">
      <img src="../assets/Untitled-design-1.svg" alt="Dynamic Sports">
      Dynamic Sports
    </a>
    <nav class="nav"></nav>
  </div>
</header>

<main class="wrap">
  <h1 id="compNameHeading">Competition Results</h1>
  <p id="compDate" class="muted small"></p>

  <!-- EVENT, ROUND, HEAT -->
  <section class="card">
    <h2>Select Event</h2>

    <label>
      Event:
      <select id="eventSelect" class="input small"></select>
    </label>

    <label>
      Round:
      <select id="roundSelect" class="input small"></select>
    </label>

    <label>
      Heat:
      <select id="heatSelect" class="input small"></select>
    </label>
  </section>

  <!-- TABS -->
  <div class="tabs" style="margin-top:1rem;">
    <button class="tab active" data-tab="Start">Start List</button>
    <button class="tab" data-tab="Results">Official Results</button>
  </div>

  <h2 id="eventTitle"></h2>

  <!-- TAB CONTENT -->
  <section id="tabStart" class="tab-content active"></section>
  <section id="tabResults" class="tab-content"></section>

</main>

<script type="module" src="../scripts/results_public.js"></script>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dynamic Sports – Admin Dashboard</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../assets/Untitled-design-1.svg">
</head>

<body class="admin-page">

  <!-- HEADER -->
  <header class="site-header">
    <div class="wrap">

      <a class="brand" href="../index.html">
        <img src="../assets/Untitled-design-1.svg" alt="Dynamic Sports logo">
        Dynamic Sports
      </a>

      <!-- NAV IS GENERATED BY nav.js -->
      <nav class="nav"></nav>

    </div>
  </header>

  <!-- MAIN -->
  <main class="wrap">

    <!-- DASHBOARD HEADER + TABS -->
    <section class="card">
      <h1>Admin Dashboard</h1>
      <p id="adminMsg" class="muted small"></p>
    
      <div class="reg-controls" style="margin-top:1rem;">
        <button class="btn secondary tab-btn active-tab" data-section-btn="news">News</button>
        <button class="btn secondary tab-btn" data-section-btn="competitions">Competitions</button>
        <button class="btn secondary tab-btn" data-section-btn="members">Members</button>
        <button class="btn secondary tab-btn" data-section-btn="registrations">Registrations</button>
      </div>
    
      <!-- ✅ LOGOUT BUTTON -->
      <div style="margin-top:1rem;">
        <button id="btnLogout" class="btn danger">Log out</button>
      </div>
    </section>
    

    <!-- NEWS -->
    <section class="card admin-section" data-section="news">
      <h2>Add News</h2>

      <input
      id="newsTitle"
      type="text"
      class="input"
      placeholder="News Title"
      required
      >

      <textarea
      id="newsSummary"
      class="input"
      rows="3"
      placeholder="Short summary (used for Facebook preview)"
      required
      ></textarea>

      <input
      id="newsFeaturedImage"
      type="file"
      class="input"
      accept="image/*"
      required
      >

      <textarea
      id="newsContent"
      class="input"
      rows="8"
      placeholder="Full article content"
     ></textarea>

<button id="addNewsBtn" class="btn">Publish Article</button>

      <ul id="newsList"></ul>
    </section>

    <!-- COMPETITIONS -->
    <section class="card admin-section" data-section="competitions" style="display:none;">
      <h2>Add Competition</h2>

      <input id="compName" type="text" class="input" placeholder="Competition Name">
      <input id="compDate" type="date" class="input">
      <input id="compLocation" type="text" class="input" placeholder="Location">
      <textarea id="compEvents" class="input" rows="4" placeholder="Event list (one per line)"></textarea>
      <input id="compImage" type="file" class="input" accept="image/*">
      <button id="addCompBtn" class="btn">Add Competition</button>

      <ul id="compList"></ul>
    </section>

    <!-- MEMBERS -->
    <section class="card admin-section" data-section="members" style="display:none;">
      <h2>Manage Members</h2>
      <p class="muted small">Promote, demote and delete members.</p>

      <ul id="memberList" class="admin-list"></ul>
    </section>

    <!-- REGISTRATIONS -->
    <section class="card admin-section" data-section="registrations" style="display:none;">
      <h2>Pending Competition Registrations</h2>
      <p class="muted small">Search, filter, approve or reject athlete applications.</p>

      <div class="reg-controls">
        <input id="regSearch" type="text" class="input small" placeholder="Search name or email">
        <select id="regCompFilter" class="input small">
          <option value="">All competitions</option>
        </select>
        <button id="exportRegsCsv" class="btn secondary">Export CSV</button>
      </div>

      <ul id="pendingRegs" class="admin-list"></ul>
    </section>

  </main>

  <!-- SCRIPTS -->
  <script type="module" src="../scripts/nav.js"></script>
  <script type="module" src="../scripts/admin.js"></script>

</body>
</html>
